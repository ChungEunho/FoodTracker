[build]
  builder = "dockerfile"
  dockerfilePath = "backend/Dockerfile"
  buildContext = "backend"

[deploy]
  healthcheckPath = "/health"
  healthcheckTimeout = 30
  restartPolicyType = "on_failure"
  restartPolicyMaxRetries = 3

[[services]]
  name = "nutritrack-backend"

  [[services.ports]]
    port = 8000
    protocol = "TCP"
