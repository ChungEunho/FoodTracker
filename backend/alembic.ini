# alembic.ini — Alembic configuration for NutriTrack
#
# The sqlalchemy.url below is a placeholder.
# env.py overrides it at runtime with the value from DATABASE_URL in .env,
# converted from the asyncpg scheme to psycopg2 for synchronous migration use.
# Do NOT put a real DATABASE_URL here — this file is committed to version control.

[alembic]
# Path to the alembic/ directory containing env.py and the versions/ folder.
# This path is relative to the directory where `alembic` is invoked.
# Run all alembic commands from the backend/ directory.
script_location = alembic

# Template for new autogenerated migration filenames.
# Produces files like: 0002_add_goals_table.py
file_template = %%(rev)s_%%(slug)s

# Timezone for the "Create Date" comment in generated migration files.
timezone = UTC

# Placeholder — overridden by env.py at runtime.
sqlalchemy.url = driver://user:pass@localhost/dbname

# Maximum length of the slug in autogenerated filenames.
truncate_slug_length = 40

# Set to true to run the environment during the 'revision' command.
revision_environment = false

# Set to true to allow .pyc files in the versions/ directory.
sourceless = false

# Version path separator — used on Windows to handle drive letters.
# Leave as the default (os) on macOS/Linux.
version_path_separator = os

# Output encoding for migration scripts.
output_encoding = utf-8

[post_write_hooks]
# No post-write hooks configured.
# Example: run black on each new migration file automatically:
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 100 REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
